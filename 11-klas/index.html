<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11. клас</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 32%),
        linear-gradient(180deg, #f8f4ff 0%, #fdf8f3 52%, #f7fbff 100%);
      color: #1e293b;
    }

    header {
      background: linear-gradient(135deg, rgba(22, 163, 74, 0.85), rgba(37, 99, 235, 0.72));
      color: white;
      text-align: center;
      padding: 60px 20px 48px;
      box-shadow: 0 8px 24px rgba(80, 60, 140, 0.18);
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
    }

    header p {
      margin: 0;
      font-size: 1.05rem;
      opacity: 0.97;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .info-box {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 24px;
      padding: 30px 26px;
      box-shadow: 0 12px 28px rgba(122, 108, 163, 0.10);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .icon-wrap {
      width: 68px;
      height: 68px;
      margin: 0 auto 18px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #16a34a;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.65),
        0 10px 20px rgba(0,0,0,0.10);
    }

    .icon-svg {
      width: 34px;
      height: 34px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .info-box h2 {
      margin: 0 0 12px;
      color: #2563eb;
      font-size: 1.6rem;
    }

    .info-box p {
      margin: 0;
      color: #475569;
      font-size: 1.02rem;
      line-height: 1.65;
    }

    .back-link {
      text-align: center;
      margin-top: 32px;
    }

    .back-link a {
      display: inline-block;
      text-decoration: none;
      background: rgba(255,255,255,0.88);
      color: #2563eb;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 18px rgba(120, 110, 150, 0.10);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .back-link a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(120, 110, 150, 0.14);
      background: rgba(255,255,255,0.96);
    }

    footer {
      text-align: center;
      padding: 28px 20px 40px;
      color: #5b6477;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.8rem;
      }

      .info-box {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>11. клас</h1>
    <p>Интерактивни ресурси по математика</p>
  </header>

  <div class="container">
    <section class="info-box">
      <div class="icon-wrap">
        <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 18h12"></path>
          <path d="M8 18V6l4 3 4-3v12"></path>
        </svg>
      </div>
      <h2>Страницата е в процес на разработка</h2>
      <p>
        Тук постепенно ще бъдат добавяни интерактивни уроци, тренажори,
        генератори на задачи, тестове и примерни контролни по математика за 11. клас.
      </p>
    </section>

    <div class="back-link">
      <a href="../">← Обратно към началото</a>
    </div>
  </div>

  <footer>
    Математика с Валя Витковска
  </footer>

</body>
</html>
