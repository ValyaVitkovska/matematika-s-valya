<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Квадратни уравнения</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 32%),
        linear-gradient(180deg, #f8f4ff 0%, #fdf8f3 52%, #f7fbff 100%);
      color: #1e293b;
    }

    header {
      background: linear-gradient(rgba(219, 39, 119, 0.82), rgba(124, 58, 237, 0.60));
      color: white;
      text-align: center;
      padding: 50px 20px 40px;
      box-shadow: 0 8px 24px rgba(80, 60, 140, 0.18);
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 2.2rem;
    }

    header p {
      margin: 0;
      font-size: 1rem;
      opacity: 0.96;
    }

    .container {
      max-width: 1000px;
      margin: 36px auto;
      padding: 0 20px;
    }

    .intro {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(122, 108, 163, 0.10);
      text-align: center;
      margin-bottom: 28px;
      backdrop-filter: blur(8px);
    }

    .intro h2 {
      margin: 0;
      color: #db2777;
      font-size: 1.5rem;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .resource-card {
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 20px;
      padding: 18px 14px;
      text-decoration: none;
      color: #1e293b;
      box-shadow: 0 10px 24px rgba(109, 117, 141, 0.10);
      backdrop-filter: blur(10px);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 145px;
      justify-content: center;
    }

    .resource-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 30px rgba(109, 117, 141, 0.14);
      border-color: #f9a8d4;
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fce7f3, #fbcfe8);
      color: #db2777;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.65),
        0 8px 18px rgba(0,0,0,0.10);
    }

    .icon-svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .resource-card h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
      font-weight: 800;
      color: #db2777;
    }

    .back-link {
      text-align: center;
      margin-top: 34px;
    }

    .back-link a {
      display: inline-block;
      text-decoration: none;
      background: rgba(255,255,255,0.88);
      color: #2563eb;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 18px rgba(120, 110, 150, 0.10);
    }

    .back-link a:hover {
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 30px 20px 42px;
      color: #5b6477;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Квадратни уравнения</h1>
    <p>Ресурси по темата</p>
  </header>

  <div class="container">
    <section class="intro">
      <h2>Избери ресурс</h2>
    </section>

    <section class="resource-grid">

      <a class="resource-card" https://valyavitkovska.github.io/escape-room-kvadratni-uravnenia/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M5 19h15"></path>
            <path d="M8 19V5"></path>
            <path d="M8 8Q12 18 16 8"></path>
          </svg>
        </div>
        <h3>Квадратни уравнения - Escape Room</h3>
      </a>

      <a class="resource-card" href="https://valyavitkovska.github.io/igra-mat-mag/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M5 19h15"></path>
            <path d="M8 19V5"></path>
            <path d="M8 8Q12 18 16 8"></path>
          </svg>
        </div>
        <h3>Квадратни уравнения - игра</h3>
      </a>

      <a class="resource-card" href="https://valyavitkovska.github.io/duel-kvadratni-uravnenia/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M5 19h15"></path>
            <path d="M8 19V5"></path>
            <path d="M8 8Q12 18 16 8"></path>
          </svg>
        </div>
        <h3>Квадратни уравнения - дуел</h3>
      </a>
       <a class="resource-card" href="https://valyavitkovska.github.io/Pazitelite-na-korenite/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M5 19h15"></path>
            <path d="M8 19V5"></path>
            <path d="M8 8Q12 18 16 8"></path>
          </svg>
        </div>
        <h3>Квадратни уравнения - игра</h3>
      </a>
 <a class="resource-card" href="https://valyavitkovska.github.io/math-stalba/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M5 19h15"></path>
            <path d="M8 19V5"></path>
            <path d="M8 8Q12 18 16 8"></path>
          </svg>
        </div>
        <h3>Квадратни уравнения - игра</h3>
      </a>
    </section>

    <div class="back-link">
      <a href="../">← Обратно към 8. клас</a>
    </div>
  </div>

  <footer>
    Математика с Валя Витковска
  </footer>

</body>
</html>
