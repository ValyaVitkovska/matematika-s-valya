<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тестове и работни листове – 8. клас</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 32%),
        linear-gradient(180deg, #f8f4ff 0%, #fdf8f3 52%, #f7fbff 100%);
      color: #1e293b;
    }

    header {
      background-image: linear-gradient(rgba(16, 185, 129, 0.78), rgba(37, 99, 235, 0.60));
      color: white;
      text-align: center;
      padding: 52px 20px 42px;
      box-shadow: 0 8px 24px rgba(80, 60, 140, 0.18);
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 2.1rem;
    }

    header p {
      margin: 0;
      font-size: 1.02rem;
      opacity: 0.97;
    }

    .container {
      max-width: 1050px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .intro {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(122, 108, 163, 0.10);
      text-align: center;
      margin-bottom: 30px;
      backdrop-filter: blur(8px);
    }

    .intro h2 {
      margin: 0;
      color: #059669;
      font-size: 1.5rem;
    }

    .test-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .test-card {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 22px;
      padding: 22px 18px;
      box-shadow: 0 10px 24px rgba(120, 110, 150, 0.10);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .icon-wrap {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      color: #059669;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.55),
        0 8px 18px rgba(0,0,0,0.10);
    }

    .icon-svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .test-card h3 {
      margin: 0 0 10px;
      color: #2563eb;
      font-size: 1.15rem;
      line-height: 1.3;
    }

    .test-card p {
      margin: 0 0 18px;
      color: #475569;
      font-size: 0.97rem;
      line-height: 1.45;
    }

    .pdf-frame {
      width: 100%;
      height: 720px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      background: white;
      box-shadow: 0 8px 20px rgba(120, 110, 150, 0.10);
    }

    .pdf-link {
      display: inline-block;
      margin-top: 14px;
      text-decoration: none;
      padding: 11px 18px;
      border-radius: 14px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #10b981, #2563eb);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
    }

    .back-link {
      text-align: center;
      margin-top: 34px;
    }

    .back-link a {
      display: inline-block;
      text-decoration: none;
      background: rgba(255,255,255,0.88);
      color: #2563eb;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 18px rgba(120, 110, 150, 0.10);
      backdrop-filter: blur(8px);
    }

    footer {
      text-align: center;
      padding: 28px 20px 40px;
      color: #5b6477;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.75rem; }

      .intro,
      .test-card {
        padding: 18px 14px;
      }

      .pdf-frame {
        height: 560px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Тестове и работни листове – 8. клас</h1>
    <p>Примерни тестове, контролни работи и материали за подготовка</p>
  </header>

  <div class="container">
    <section class="intro">
      <h2>Избери материал</h2>
    </section>

    <section class="test-grid">

      <div class="test-card">
        <div class="icon-wrap">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="3" width="16" height="18" rx="2"></rect>
            <path d="M8 7h8"></path>
            <path d="M8 11h8"></path>
            <path d="M8 15h5"></path>
          </svg>
        </div>

        <h3>Окръжност и ъгъл</h3>
        <p>Работен лист / тест по темата „Окръжност и ъгъл“.</p>

        <iframe
          class="pdf-frame"
          src="https://docs.google.com/gview?url=https://valyavitkovska.github.io/matematika-s-valya/8-klas/testove/okrajnost-i-agal.pdf&embedded=true">
        </iframe>

        <a class="pdf-link" href="https://docs.google.com/gview?url=https://valyavitkovska.github.io/matematika-s-valya/8-klas/testove/okrajnost-i-agal.pdf" target="_blank">
          Отвори PDF на цял екран
        </a>
      </div>

    </section>

    <div class="back-link">
      <a href="../">← Обратно към 8. клас</a>
    </div>
  </div>

  <footer>
    Математика с Валя Витковска
  </footer>

</body>
</html>
