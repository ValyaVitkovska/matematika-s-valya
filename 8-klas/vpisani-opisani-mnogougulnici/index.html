<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вписани и описани многоъгълници</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 32%),
        linear-gradient(180deg, #f8f4ff 0%, #fdf8f3 52%, #f7fbff 100%);
      color: #1e293b;
    }

    header {
      text-align: center;
      padding: 56px 20px 38px;
      background:
        linear-gradient(135deg, rgba(220, 38, 38, 0.88), rgba(147, 51, 234, 0.78));
      color: white;
      box-shadow: 0 8px 24px rgba(80, 60, 140, 0.18);
    }

    header h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      font-weight: 800;
      text-shadow: 0 2px 14px rgba(0,0,0,0.25);
    }

    header p {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0.95;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .intro {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 28px rgba(122, 108, 163, 0.10);
      margin-bottom: 28px;
      backdrop-filter: blur(8px);
    }

    .intro h2 {
      margin: 0;
      color: #dc2626;
      font-size: 1.5rem;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .lesson-card {
      display: block;
      text-decoration: none;
      color: #1e293b;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 22px;
      padding: 24px;
      min-height: 180px;
      box-shadow: 0 10px 24px rgba(109, 117, 141, 0.10);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .lesson-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(254, 226, 226, 0.9) 0%, transparent 42%);
      pointer-events: none;
    }

    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 30px rgba(109, 117, 141, 0.15);
      border-color: #fca5a5;
    }

    .lesson-icon {
      position: relative;
      z-index: 1;
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      color: #dc2626;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .lesson-icon svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .lesson-card h3 {
      position: relative;
      z-index: 1;
      margin: 0 0 10px;
      color: #dc2626;
      font-size: 1.25rem;
      line-height: 1.25;
    }

    .lesson-card p {
      position: relative;
      z-index: 1;
      margin: 0;
      color: #475569;
      line-height: 1.5;
      font-size: 0.98rem;
    }

    .back-link {
      text-align: center;
      margin-top: 34px;
    }

    .back-link a {
      display: inline-block;
      text-decoration: none;
      background: rgba(255,255,255,0.88);
      color: #2563eb;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 18px rgba(120, 110, 150, 0.10);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .back-link a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(120, 110, 150, 0.14);
      background: rgba(255,255,255,0.96);
    }

    footer {
      text-align: center;
      padding: 30px 20px 42px;
      color: #5b6477;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Вписани и описани многоъгълници</h1>
    <p>Интерактивни уроци и ресурси</p>
  </header>

  <main class="container">
    <section class="intro">
      <h2>Избери урок</h2>
    </section>

    <section class="lesson-grid">

      <a class="lesson-card" href="https://valyavitkovska.github.io/zabelejitelni-tochki/" target="_blank" rel="noopener">
        <div class="lesson-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 18h16"></path>
            <path d="M6 18L12 5l6 13"></path>
            <circle cx="12" cy="10" r="1.5"></circle>
            <circle cx="10" cy="14" r="1.5"></circle>
            <circle cx="14" cy="14" r="1.5"></circle>
          </svg>
        </div>
        <h3>Забележителни точки в триъгълник</h3>
        <p>Интерактивен урок за ортоцентър, медицентър и център на описаната окръжност.</p>
      </a>

    </section>

    <div class="back-link">
      <a href="../">← Обратно към 8. клас</a>
    </div>
  </main>

  <footer>
    Математика с Валя Витковска
  </footer>

</body>
</html>
