<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8. клас</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 32%),
        linear-gradient(180deg, #f8f4ff 0%, #fdf8f3 52%, #f7fbff 100%);
      color: #1e293b;
    }

    header {
      background-image: linear-gradient(rgba(59, 91, 219, 0.70), rgba(147, 51, 234, 0.60)), url("bg-8klas.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      text-align: center;
      padding: 55px 20px 45px;
      box-shadow: 0 8px 24px rgba(80, 60, 140, 0.18);
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
    }

    header p {
      margin: 0;
      font-size: 1.05rem;
      opacity: 0.96;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .intro {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 10px 28px rgba(122, 108, 163, 0.10);
      text-align: center;
      margin-bottom: 30px;
      backdrop-filter: blur(8px);
    }

    .intro h2 {
      margin: 0;
      color: #2563eb;
      font-size: 1.6rem;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 18px;
    }

    .resource-card {
      --hover-tint: rgba(219, 234, 254, 0.45);
      --hover-border: #93c5fd;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 22px;
      padding: 18px 14px;
      text-decoration: none;
      color: #1e293b;
      box-shadow: 0 10px 24px rgba(120, 110, 150, 0.10);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        border-color 0.22s ease,
        background 0.22s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 165px;
      justify-content: flex-start;
      backdrop-filter: blur(10px);
    }

    .resource-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 30px rgba(110, 98, 146, 0.14);
      border-color: var(--hover-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, var(--hover-tint) 100%);
    }

    .icon-wrap {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.55),
        0 8px 18px rgba(0,0,0,0.10);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .resource-card:hover .icon-wrap {
      transform: scale(1.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.65),
        0 10px 20px rgba(0,0,0,0.13);
    }

    .icon-svg {
      width: 27px;
      height: 27px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .resource-card h3 {
      margin: 0;
      color: #2563eb;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .resource-count {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      background: rgba(219, 234, 254, 0.92);
      color: #1e3a8a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .icon-violet {
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      color: #7c3aed;
    }

    .icon-cyan {
      background: linear-gradient(135deg, #cffafe, #a5f3fc);
      color: #0891b2;
    }

    .icon-green {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #16a34a;
    }

    .icon-orange {
      background: linear-gradient(135deg, #ffedd5, #fed7aa);
      color: #ea580c;
    }

    .icon-pink {
      background: linear-gradient(135deg, #fce7f3, #fbcfe8);
      color: #db2777;
    }

    .icon-yellow {
      background: linear-gradient(135deg, #fef9c3, #fde68a);
      color: #ca8a04;
    }

    .icon-teal {
      background: linear-gradient(135deg, #ccfbf1, #99f6e4);
      color: #0f766e;
    }

    .icon-red {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      color: #dc2626;
    }

    .icon-emerald {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      color: #059669;
    }

    .hover-violet {
      --hover-tint: rgba(237, 233, 254, 0.7);
      --hover-border: #c4b5fd;
    }

    .hover-cyan {
      --hover-tint: rgba(207, 250, 254, 0.7);
      --hover-border: #67e8f9;
    }

    .hover-green {
      --hover-tint: rgba(220, 252, 231, 0.72);
      --hover-border: #86efac;
    }

    .hover-orange {
      --hover-tint: rgba(255, 237, 213, 0.78);
      --hover-border: #fdba74;
    }

    .hover-pink {
      --hover-tint: rgba(252, 231, 243, 0.78);
      --hover-border: #f9a8d4;
    }

    .hover-yellow {
      --hover-tint: rgba(254, 249, 195, 0.82);
      --hover-border: #fde047;
    }

    .hover-teal {
      --hover-tint: rgba(204, 251, 241, 0.78);
      --hover-border: #5eead4;
    }

    .hover-red {
      --hover-tint: rgba(254, 226, 226, 0.78);
      --hover-border: #fca5a5;
    }

    .hover-emerald {
      --hover-tint: rgba(209, 250, 229, 0.78);
      --hover-border: #6ee7b7;
    }

    .back-link {
      text-align: center;
      margin-top: 35px;
    }

    .back-link a {
      display: inline-block;
      text-decoration: none;
      background: rgba(255,255,255,0.88);
      color: #2563eb;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 18px rgba(120, 110, 150, 0.10);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .back-link a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(120, 110, 150, 0.14);
      background: rgba(255,255,255,0.96);
    }

    footer {
      text-align: center;
      padding: 28px 20px 40px;
      color: #5b6477;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.8rem;
      }

      .intro,
      .resource-card {
        padding: 18px 14px;
      }

      .icon-wrap {
        width: 50px;
        height: 50px;
      }

      .icon-svg {
        width: 25px;
        height: 25px;
      }

      .resource-card h3 {
        font-size: 1rem;
      }

      .resource-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>8. клас</h1>
    <p>Уроци, тренажори и преговор</p>
  </header>

  <div class="container">
    <section class="intro">
      <h2>Избери ресурс</h2>
    </section>

    <section class="resource-grid">

      <a class="resource-card hover-violet" href="#">
        <div class="icon-wrap icon-violet">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="6" cy="6" r="2"></circle>
            <circle cx="18" cy="6" r="2"></circle>
            <circle cx="12" cy="18" r="2"></circle>
            <path d="M8 6h8"></path>
            <path d="M7.5 7.5l3 7"></path>
            <path d="M16.5 7.5l-3 7"></path>
          </svg>
        </div>
        <h3>Основни комбинаторни понятия</h3>
      </a>

      <a class="resource-card hover-cyan" href="#">
        <div class="icon-wrap icon-cyan">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 18L18 6"></path>
            <path d="M13 6h5v5"></path>
          </svg>
        </div>
        <h3>Вектори</h3>
      </a>

      <a class="resource-card hover-green" href="#">
        <div class="icon-wrap icon-green">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 18l4-8 4 8z"></path>
            <path d="M13 18l2-8h4l2 8z"></path>
          </svg>
        </div>
        <h3>Триъгълник и трапец</h3>
      </a>

      <a class="resource-card hover-orange" href="#">
        <div class="icon-wrap icon-orange">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 13h4l2 6 5-14h7"></path>
          </svg>
        </div>
        <h3>Квадратен корен</h3>
      </a>

      <a class="resource-card hover-pink" href="#">
        <div class="icon-wrap icon-pink">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 19h15"></path>
            <path d="M8 19V5"></path>
            <path d="M8 8Q12 18 16 8"></path>
          </svg>
        </div>
        <h3>Квадратни уравнения</h3>
      </a>

      <a class="resource-card hover-yellow" href="okrazhnost/">
        <div class="icon-wrap icon-yellow">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="7"></circle>
          </svg>
        </div>
        <h3>Окръжност</h3>
        <span class="resource-count">2 ресурса</span>
      </a>

      <a class="resource-card hover-teal" href="#">
        <div class="icon-wrap icon-teal">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 7h8"></path>
            <path d="M6 12h12"></path>
            <path d="M8 17h8"></path>
          </svg>
        </div>
        <h3>Рационални изрази</h3>
      </a>

      <a class="resource-card hover-red" href="#">
        <div class="icon-wrap icon-red">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8"></circle>
            <path d="M12 6l4.5 2.5v5L12 16l-4.5-2.5v-5z"></path>
          </svg>
        </div>
        <h3>Вписани и описани многоъгълници</h3>
      </a>

      <a class="resource-card hover-emerald" href="testove/">
        <div class="icon-wrap icon-emerald">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="3" width="16" height="18" rx="2"></rect>
            <path d="M8 7h8"></path>
            <path d="M8 11h8"></path>
            <path d="M8 15h5"></path>
            <path d="M16.5 16.5l1.5 1.5 3-3"></path>
          </svg>
        </div>
        <h3>Тестове</h3>
      </a>

    </section>

    <div class="back-link">
      <a href="../">← Обратно към началото</a>
    </div>
  </div>

  <footer>
    Математика с Валя Витковска
  </footer>

</body>
</html>
