<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9. клас</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 32%),
        linear-gradient(180deg, #f8f4ff 0%, #fdf8f3 52%, #f7fbff 100%);
      color: #1e293b;
    }

    header {
      background-image:
        linear-gradient(rgba(255,255,255,0.08), rgba(255,255,255,0.08)),
        url("bg-9klas.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      color: white;
      text-align: center;
      padding: 55px 20px 45px;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(80, 60, 140, 0.18);
    }

    .hero-content {
      padding: 10px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      backdrop-filter: blur(2px);
    }

    .hero-content h1 {
      margin: 0 0 8px;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      line-height: 1.05;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 14px rgba(0,0,0,0.22);
    }

    .hero-content p {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 1px 8px rgba(0,0,0,0.18);
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .intro {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 10px 28px rgba(122, 108, 163, 0.10);
      text-align: center;
      margin-bottom: 30px;
      backdrop-filter: blur(8px);
    }

    .intro h2 {
      margin: 0;
      color: #2563eb;
      font-size: 1.6rem;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
    }

    .resource-card {
      --hover-tint: rgba(219, 234, 254, 0.45);
      --hover-border: #93c5fd;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 20px;
      padding: 16px 12px;
      text-decoration: none;
      color: #1e293b;
      box-shadow: 0 10px 24px rgba(109, 117, 141, 0.10);
      backdrop-filter: blur(10px);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        border-color 0.22s ease,
        background 0.22s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 145px;
      justify-content: flex-start;
    }

    .resource-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, var(--hover-tint) 0%, transparent 34%);
      opacity: 0.75;
      pointer-events: none;
    }

    .resource-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 30px rgba(109, 117, 141, 0.14);
      border-color: var(--hover-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, var(--hover-tint) 100%);
    }

    .icon-wrap {
      position: relative;
      z-index: 1;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.65),
        0 8px 18px rgba(0,0,0,0.10);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .resource-card:hover .icon-wrap {
      transform: scale(1.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.70),
        0 10px 20px rgba(0,0,0,0.13);
    }

    .icon-svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .resource-card h3 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
      font-weight: 800;
    }

    .resource-count {
      position: relative;
      z-index: 1;
      display: inline-block;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      background: rgba(219, 234, 254, 0.92);
      color: #1e3a8a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .theme-blue { --hover-tint: rgba(219, 234, 254, 0.86); --hover-border: #93c5fd; }
    .theme-blue .icon-wrap { background: linear-gradient(135deg, #dbeafe, #c7d2fe); color: #2563eb; }
    .theme-blue h3 { color: #2563eb; }

    .theme-violet { --hover-tint: rgba(237, 233, 254, 0.88); --hover-border: #c4b5fd; }
    .theme-violet .icon-wrap { background: linear-gradient(135deg, #ede9fe, #ddd6fe); color: #7c3aed; }
    .theme-violet h3 { color: #7c3aed; }

    .theme-cyan { --hover-tint: rgba(207, 250, 254, 0.88); --hover-border: #67e8f9; }
    .theme-cyan .icon-wrap { background: linear-gradient(135deg, #cffafe, #a5f3fc); color: #0891b2; }
    .theme-cyan h3 { color: #0891b2; }

    .theme-green { --hover-tint: rgba(220, 252, 231, 0.88); --hover-border: #86efac; }
    .theme-green .icon-wrap { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #16a34a; }
    .theme-green h3 { color: #16a34a; }

    .theme-orange { --hover-tint: rgba(255, 237, 213, 0.88); --hover-border: #fdba74; }
    .theme-orange .icon-wrap { background: linear-gradient(135deg, #ffedd5, #fed7aa); color: #ea580c; }
    .theme-orange h3 { color: #ea580c; }

    .theme-pink { --hover-tint: rgba(252, 231, 243, 0.88); --hover-border: #f9a8d4; }
    .theme-pink .icon-wrap { background: linear-gradient(135deg, #fce7f3, #fbcfe8); color: #db2777; }
    .theme-pink h3 { color: #db2777; }

    .theme-teal { --hover-tint: rgba(204, 251, 241, 0.88); --hover-border: #5eead4; }
    .theme-teal .icon-wrap { background: linear-gradient(135deg, #ccfbf1, #99f6e4); color: #0f766e; }
    .theme-teal h3 { color: #0f766e; }

    .theme-indigo { --hover-tint: rgba(224, 231, 255, 0.88); --hover-border: #a5b4fc; }
    .theme-indigo .icon-wrap { background: linear-gradient(135deg, #e0e7ff, #c7d2fe); color: #4338ca; }
    .theme-indigo h3 { color: #4338ca; }

    .back-link {
      text-align: center;
      margin-top: 34px;
    }

    .back-link a {
      display: inline-block;
      text-decoration: none;
      background: rgba(255,255,255,0.88);
      color: #2563eb;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 18px rgba(120, 110, 150, 0.10);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .back-link a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(120, 110, 150, 0.14);
      background: rgba(255,255,255,0.96);
    }

    footer {
      text-align: center;
      padding: 30px 20px 42px;
      color: #5b6477;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      header {
        min-height: 220px;
        padding: 50px 18px 36px;
      }

      .hero-content {
        padding: 10px 14px;
        border-radius: 18px;
      }

      .hero-content h1 {
        font-size: 2rem;
      }

      .container {
        padding: 0 16px;
      }

      .intro,
      .resource-card {
        border-radius: 20px;
      }

      .intro {
        padding: 22px 18px;
      }

      .resource-card {
        padding: 16px 12px;
        min-height: 138px;
      }

      .icon-wrap {
        width: 46px;
        height: 46px;
      }

      .resource-grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="hero-content">
      <h1>9. клас</h1>
      <p>Интерактивни ресурси по теми</p>
    </div>
  </header>

  <div class="container">
    <section class="intro">
      <h2>Избери тема</h2>
    </section>

    <section class="resource-grid">

      <a class="resource-card theme-orange" href="klasicheska-veroyatnost/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <circle cx="8" cy="8" r="2.5"></circle>
            <circle cx="16" cy="16" r="2.5"></circle>
            <path d="M6 16l12-8"></path>
            <path d="M4 4l4 4"></path>
            <path d="M16 12l4 4"></path>
          </svg>
        </div>
        <h3>Класическа вероятност</h3>
        <span class="resource-count" data-count="0"></span>
      </a>

      <a class="resource-card theme-cyan" href="funktsii/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M4 18h16"></path>
            <path d="M6 16V6"></path>
            <path d="M7 15c2-5 4-7 6-7s4 2 5 5"></path>
          </svg>
        </div>
        <h3>Функции</h3>
        <span class="resource-count" data-count="0"></span>
      </a>

      <a class="resource-card theme-teal" href="sistemi-lineyni-uravneniya/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M4 7h16"></path>
            <path d="M4 17h16"></path>
            <path d="M9 5v14"></path>
            <path d="M15 5v14"></path>
          </svg>
        </div>
        <h3>Системи линейни уравнения</h3>
        <span class="resource-count" data-count="0"></span>
      </a>

      <a class="resource-card theme-pink" href="sistemi-uravneniya-ot-vtora-stepen/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M5 19h14"></path>
            <path d="M8 19V7"></path>
            <path d="M8 10c2-3 6-3 8 0"></path>
            <path d="M8 14c2-3 6-3 8 0"></path>
          </svg>
        </div>
        <h3>Системи уравнения от втора степен</h3>
        <span class="resource-count" data-count="0"></span>
      </a>

      <a class="resource-card theme-green" href="podobni-triagalnitsi/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M4 18l5-10 5 10z"></path>
            <path d="M11 18l4-8 5 8z"></path>
          </svg>
        </div>
        <h3>Подобни триъгълници</h3>
        <span class="resource-count" data-count="3"></span>
      </a>

      <a class="resource-card theme-blue" href="ratsionalni-neravenstva/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M8 7h8"></path>
            <path d="M6 12h12"></path>
            <path d="M8 17h8"></path>
          </svg>
        </div>
        <h3>Рационални неравенства</h3>
        <span class="resource-count" data-count="4"></span>
      </a>

      <a class="resource-card theme-violet" href="metrichni-zavisimosti/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M4 18l7-10 9 10"></path>
            <path d="M7 18h10"></path>
            <path d="M12 9v9"></path>
          </svg>
        </div>
        <h3>Метрични зависимости</h3>
        <span class="resource-count" data-count="1"></span>
      </a>

      <a class="resource-card theme-indigo" href="trigonometrichni-funktsii/">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M4 18a8 8 0 0 1 16 0"></path>
            <path d="M12 10l5-3"></path>
            <path d="M12 10v8"></path>
            <path d="M8 18h8"></path>
          </svg>
        </div>
        <h3>Тригонометрични функции</h3>
        <span class="resource-count" data-count="0"></span>
      </a>

    </section>

    <div class="back-link">
      <a href="../">← Обратно към началото</a>
    </div>
  </div>

  <footer>
    Математика с Валя Витковска
  </footer>

  <script>
    document.querySelectorAll('.resource-count').forEach(el => {
      const count = Number(el.dataset.count || 0);
      el.textContent = count === 1 ? '1 ресурс' : `${count} ресурса`;
    });
  </script>

</body>
</html>
