<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тестове и работни листове | 9. клас</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #f0fdf4 0%, #f8fafc 100%);
      color: #1e293b;
    }

    header {
      text-align: center;
      padding: 48px 20px 36px;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      color: white;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
    }

    header p {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .container {
      max-width: 900px;
      margin: 36px auto;
      padding: 0 20px;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .resource-card {
      display: block;
      text-decoration: none;
      background: white;
      border: 1px solid #bbf7d0;
      border-radius: 22px;
      padding: 24px;
      color: #1e293b;
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .resource-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(15, 118, 110, 0.18);
    }

    .icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: #dcfce7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #059669;
      margin-bottom: 14px;
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h2 {
      margin: 0 0 8px;
      color: #047857;
      font-size: 1.25rem;
    }

    .description {
      margin: 0 0 14px;
      line-height: 1.5;
      color: #475569;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1e40af;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .back-link {
      text-align: center;
      margin-top: 36px;
    }

    .back-link a {
      display: inline-block;
      text-decoration: none;
      color: #047857;
      background: white;
      border: 1px solid #bbf7d0;
      padding: 12px 20px;
      border-radius: 14px;
      font-weight: 700;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <header>
    <h1>Тестове и работни листове</h1>
    <p>Материали за подготовка, упражнение и проверка на знанията | 9. клас</p>
  </header>

  <main class="container">

    <section class="resource-grid">

      <a class="resource-card" href="https://valyavitkovska.github.io/klasna.rabota2.9.klas.puzzle/" target="_blank">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M9 11h6"></path>
            <path d="M9 15h6"></path>
            <path d="M8 3h8l3 3v15H5V3h3z"></path>
            <path d="M16 3v4h4"></path>
          </svg>
        </div>

        <h2>Подготовка за класна работа №2</h2>
        <p class="description">
          Интерактивен пъзел със задачи за 9. клас.
        </p>
        <span class="badge">интерактивен ресурс</span>
      </a>

    </section>

    <div class="back-link">
      <a href="../">← Обратно към 9. клас</a>
    </div>

  </main>

  <footer>
    Математика с Валя Витковска
  </footer>

</body>
</html>
